<div id="popup" aria-hidden="true" class="popup">
	<div class="popup__wrapper">
		<div class="popup__content">
			<div class="popup__body">
            <h3 class="popup__title">Вход в систему</h3>
            <label class="popup__label" for="userName">Имя ползователя</label>
            <input class="popup__input" type="name" id="userName" placeholder="Ведите ваше имя.." />
            <label class="popup__label" for="userPassword">Пароль пользавателя</label>
            <input class="popup__input" type="password" id="userPassword" placeholder="Ведите ваш пароль.." />
            <div class="popup__block">
               <button type="submit" id="submit" class="popup__submit">Зарегистрирываться</button>
               <button data-close type="button" class="popup__close">Закрыть</button>
            </div>
			</div>
		</div>
	</div>
</div>
